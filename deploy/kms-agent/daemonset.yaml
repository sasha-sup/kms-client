apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kms-agent
  namespace: kms-system
  labels:
    app: kms-agent
spec:
  selector:
    matchLabels:
      app: kms-agent
  template:
    metadata:
      labels:
        app: kms-agent
    spec:
      serviceAccountName: kms-agent
      tolerations:
        - operator: Exists
      containers:
        - name: kms-agent
          image: ghcr.io/siderolabs/kms-agent:latest
          env:
            # NODE_UUID is optional. When omitted the agent discovers
            # its UUID from the KMS server via POST /node/identify
            # using its IP address. The server learns the UUID during
            # the first Unseal request from Talos at boot time.
            # If you know the UUID (e.g., from Talos machine config),
            # you can still set it explicitly here.
            #
            # - name: NODE_UUID
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: KMS_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: kms-agent-config
                  key: kms-server-url
            - name: HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: kms-agent-config
                  key: heartbeat-interval
            - name: HEARTBEAT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: kms-agent-secret
                  key: hmac-key
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
